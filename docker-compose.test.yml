
services:

  # Run a simple registry pull-through cache for testing
  registry:
    image: sut
    environment:
      REGISTRY2_PROXY_ENABLED: true
      API_TOKENAUTH_JWKS: 
    tmpfs:
      - /data:exec

  docker:
    image: docker:29.5.3-dind@sha256:7d85d0eda291f1a7ab6df4a9d1802b5ad4cf9145a088bd11188c78dcb5c7392b
    privileged: true
    environment:
      DOCKER_TLS_CERTDIR: ""
    command: --insecure-registry=registry:80 --registry-mirror=http://registry:80 --tls=false --debug
    depends_on:
      - registry
    tmpfs:
      - /var/lib/docker:exec

  sut:
    image: docker:29.5.3@sha256:ad68e89b675740867a3bb96488a93fea9209ad36c6305bfba2664912d6dcf11a
    environment:
      DOCKER_HOST: tcp://docker:2375
    entrypoint:
      - /bin/sh
      - -c
    command:
      - |
        apk add --no-cache curl
        count=1
        while ! docker info 2>/dev/null && [ "$${count}" -le 10 ]; do
          sleep 1
          count=$$((count + 1))
        done
        docker run --rm hello-world
        curl -v http://registry:80/v2/_catalog | grep hello-world
    depends_on:
      - docker
      - registry
